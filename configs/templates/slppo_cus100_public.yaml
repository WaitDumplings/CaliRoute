# Reference command-equivalent config generated by the new paper-facing CLI.
# Prefer `python train.py ...` for new runs; legacy YAML launch remains available.
run_name: CALIROUTE_EVRPTW_CUS100_CS20_SLPPO_SEED3009_E1500_N128_R160
dataset_name: Geo-EVRPTW-v1
data:
  problem_type: evrptw
  num_customers: 100
  num_charging_stations: 20
  train_dataset_path: ../Routing-D/evrptw/train/Cus100
  train_sample_mode: shuffle_cycle
  async_instance_prefetch: false
env:
  use_fast_env: true
  use_jit_mask: true
  normalize_reward: true
  reward_distance_scale_mode: dataset_single_customer_repair_median
  charging_mode: fixed_full
  info_level: light
model:
  embedding_dim: 256
  tanh_clipping: 15.0
  n_encode_layers: 2
  use_graph_token: true
  use_dynamic_decision_encoder: true
  dynamic_decision_heads: 4
  dynamic_decision_delta_k: false
  dynamic_decision_delta_v: false
  dynamic_decision_delta_action_key: true
  dynamic_decision_action_bias: true
  distance_injection: encoder
  use_encoder_distance_bias: true
critic:
  use_decomposed_critic: false
  advantage_mode: total
training:
  online_training: false
  epochs: 1500
  num_envs_per_gpu: 128
  n_traj: 50
  rollout_steps: 160
  ppo_step_chunk_size: 32
  ppo_update_epochs: 4
  num_minibatches: 4
  gamma: 0.99
  gae_lambda: 0.95
  clip_coef: 0.2
  vf_coef: 0.5
  ent_coef: 0.01
  learning_rate: 0.0001
  weight_decay: 0.0
  max_grad_norm: 1.0
  checkpoint_interval: 50
  debug: true
  debug_log_every: 1
  mixed_precision: true
pbrs:
  use_customer_pbrs: false
  use_repair_distance_pbrs: false
  use_feasible_ratio_pbrs: false
  use_terminal_heuristic: false
evaluation:
  eval_interval: 20
  eval_path: ../Routing-D/evrptw/val/Cus100
  eval_n_traj: 50
  eval_decode_mode: sample
  eval_max_steps: 160
  eval_batch_size: 1000
  eval_info_level: light
  eval_save_routes: false
  gurobi_summary_path: ../Routing-D/evrptw/val/Cus100/gurobi_summary.csv
offline:
  method: sl_ppo
  init_checkpoint_strict: false
  strict_replay: false
  expert_solution_path: ../Routing-D/evrptw/train/Cus100/expert_solutions.csv
  expert_dataset_path: ../Routing-D/evrptw/train/Cus100
  sl_coef: 0.5
  sl_clip_coef: 0.2
  only_success_route_loss: true
  use_priority_sampler: true
  priority_selection_mode: weighted
  priority_mix_rho: 0.5
  priority_alpha: 0.7
